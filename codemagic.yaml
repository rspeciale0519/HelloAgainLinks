workflows:
  ios-testflight:
    name: HAL iOS — TestFlight (internal)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: hal_app_store_connect
    environment:
      groups:
        - hal_mobile_env
      node: "22"
      vars:
        NEXT_TELEMETRY_DISABLED: "1"
        XCODE_PROJECT: "apps/web/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.helloagainlinks.app"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.helloagainlinks.app
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Enable corepack / pnpm
        script: |
          corepack enable
          corepack prepare pnpm@10.28.2 --activate
      - name: Install dependencies
        script: pnpm install --frozen-lockfile
      - name: Build workspace packages (@helloagain/ui, @helloagain/shared)
        script: pnpm --filter @helloagain/ui --filter @helloagain/shared run build
      - name: Build web app + sync Capacitor iOS
        script: pnpm mobile:build
      - name: Set up code signing (App Store Connect integration)
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/apps/web/ios/App
          # Use Codemagic's monotonic build counter for CFBundleVersion.
          # The App Store Connect get-latest-build-number query returns empty
          # right after an upload (API lag), which produced a duplicate "1"
          # and a 409 on publish. $BUILD_NUMBER is always unique & increasing.
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build .ipa for App Store Connect
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

  android-release:
    name: HAL Android — signed release APK/AAB
    max_build_duration: 45
    instance_type: linux_x2
    environment:
      node: "22"
      groups:
        - hal_android_signing
        - hal_mobile_env
      vars:
        NEXT_TELEMETRY_DISABLED: "1"
        PACKAGE_NAME: "com.helloagainlinks.app"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Enable corepack / pnpm
        script: |
          corepack enable
          corepack prepare pnpm@10.28.2 --activate
      - name: Install dependencies
        script: pnpm install --frozen-lockfile
      - name: Build workspace packages (@helloagain/ui, @helloagain/shared)
        script: pnpm --filter @helloagain/ui --filter @helloagain/shared run build
      - name: Build web app + sync Capacitor Android
        script: |
          BUILD_TARGET=mobile pnpm --filter @helloagain/web run build
          pnpm --filter @helloagain/web exec cap sync android
      - name: Build signed AAB
        script: |
          cd apps/web/android
          ./gradlew bundleRelease
    artifacts:
      - apps/web/android/app/build/outputs/**/*.aab
      - apps/web/android/app/build/outputs/**/*.apk
