name: Build iOS (Simulator)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @helloagain/ui --filter @helloagain/shared run build

      - name: Build web app + sync Capacitor (iOS)
        run: pnpm mobile:build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          CAP_PLATFORM: ios
          # Public client env — inlined into the static bundle at build time
          # (same rationale as codemagic.yaml). Not secrets.
          NEXT_PUBLIC_SUPABASE_URL: 'https://hvvvoiwpoldnresqqcbc.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2dnZvaXdwb2xkbnJlc3FxY2JjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0NzU2MjQsImV4cCI6MjA4NjA1MTYyNH0.G2QvTRYedCFC4QVClI0ajI4IkfpevAeI7WBcF_OAkbI'
          NEXT_PUBLIC_APP_URL: 'https://helloagainlinks.com'

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build iOS app for simulator (no signing)
        working-directory: apps/web
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package iOS build artifact
        working-directory: apps/web
        run: |
          zip -r hal-ios-simulator-build.zip ios/build/Build/Products/Debug-iphonesimulator/App.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: hal-ios-simulator-build
          path: apps/web/hal-ios-simulator-build.zip
          if-no-files-found: error
