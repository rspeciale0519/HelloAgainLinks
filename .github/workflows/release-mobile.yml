name: Release Mobile Builds

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @helloagain/ui --filter @helloagain/shared run build

      - name: Build web app + sync Capacitor (Android)
        run: pnpm mobile:build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          CAP_PLATFORM: android
          # Public client env — inlined at build time (see codemagic.yaml). Not secrets.
          NEXT_PUBLIC_SUPABASE_URL: 'https://hvvvoiwpoldnresqqcbc.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2dnZvaXdwb2xkbnJlc3FxY2JjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0NzU2MjQsImV4cCI6MjA4NjA1MTYyNH0.G2QvTRYedCFC4QVClI0ajI4IkfpevAeI7WBcF_OAkbI'
          NEXT_PUBLIC_APP_URL: 'https://helloagainlinks.com'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: apps/web/android
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: hal-android-debug-apk
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @helloagain/ui --filter @helloagain/shared run build

      - name: Build web app + sync Capacitor (iOS)
        run: pnpm mobile:build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          CAP_PLATFORM: ios
          # Public client env — inlined at build time (see codemagic.yaml). Not secrets.
          NEXT_PUBLIC_SUPABASE_URL: 'https://hvvvoiwpoldnresqqcbc.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2dnZvaXdwb2xkbnJlc3FxY2JjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0NzU2MjQsImV4cCI6MjA4NjA1MTYyNH0.G2QvTRYedCFC4QVClI0ajI4IkfpevAeI7WBcF_OAkbI'
          NEXT_PUBLIC_APP_URL: 'https://helloagainlinks.com'

      - name: Build iOS app for simulator (no signing)
        working-directory: apps/web
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package iOS artifact
        working-directory: apps/web
        run: |
          zip -r hal-ios-simulator-build.zip ios/build/Build/Products/Debug-iphonesimulator/App.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: hal-ios-simulator-build
          path: apps/web/hal-ios-simulator-build.zip
          if-no-files-found: error

  create-release:
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-ios

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: hal-android-debug-apk
          path: artifacts/android

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: hal-ios-simulator-build
          path: artifacts/ios

      - name: Create GitHub release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: HAL Mobile v${{ github.event.inputs.version }}
          generate_release_notes: true
          files: |
            artifacts/android/app-debug.apk
            artifacts/ios/hal-ios-simulator-build.zip
